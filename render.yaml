services:
  - type: web
    name: primetrade-app
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    preDeployCommand: npm run db:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: primetrade-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production

databases:
  - name: primetrade-db
    plan: free
    region: singapore
